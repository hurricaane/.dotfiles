[metadata]
name = "alias"
description = "A channel to select from shell aliases"

[source]
# you may need to adjust the command depending on your shell
command = "fish -c 'alias'"
output = "{split: :1}"

[preview]
command = "fish -c 'alias' | grep -E '^alias {split: :1} '"

[ui.preview_panel]
size = 30
