#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
blacklist = ["scratch"]

cache = false

[default_session]
preview_command = "eza --long --header --icons --all --group-directories-first --git --color=always {}"
startup_command = "nvim -c 'lua Snacks.picker.files({ root = false, layout = \"default\" })'"

[[session]]
name = "home"
path = "~"
disable_startup_command = true

[[session]]
name = "downloads"
path = "~/Downloads"
startup_command = "y"

[[session]]
name = "tmux configuration"
path = "~/dotfiles/tmux"

[[session]]
name = "sesh configuration"
path = "~/dotfiles/sesh"
startup_command = "nvim sesh.toml"

[[session]]
name = "ghostty configuration"
path = "~/dotfiles/ghostty"
startup_command = "nvim config"

[[session]]
name = "hyprland configuration"
path = "~/dotfiles/hypr"

[[session]]
name = "nvim configuration"
path = "~/dotfiles/neovims/LazyVim"

[[session]]
name = "yazi configuration"
path = "~/dotfiles/yazi"

[[session]]
name = "fish configuration"
path = "~/dotfiles/fish"
