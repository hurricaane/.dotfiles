"$schema" = 'https://starship.rs/config-schema.json'

# format = """
# $directory\
# $git_branch\
# $git_status\
# $fill\
# $lua\
# $python\
# $nodejs\
# $golang\
# $rust\
# $terraform\
# $kubernetes\
# $aws\
# $docker_context\
# $jobs\
# $cmd_duration\
# $line_break\
# $character
# """

command_timeout = 200
format = """
$os\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$fill\
$kubernetes\
$docker_context\
$package\
$c\
$cmake\
$deno\
$dotnet\
$gleam\
$golang\
$helm\
$java\
$gradle\
$lua\
$nodejs\
$php\
$pulumi\
$python\
$ruby\
$rust\
$terraform\
$typst\
$vagrant\
$zig\
$nix_shell\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$cmd_duration\
$jobs\
$status\
$container\
$shell\
$line_break\
$character
"""

palette = "catppuccin_mocha"

[fill]
symbol = " "

[directory]
truncation_length = 0
repo_root_style = "bold bright-cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[golang]
format = '[$symbol($version )]($style)'

[aws]
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'

[cmd_duration]
format = '[$duration]($style)'

[kubernetes]
disabled = false

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = "✖ "

[os]
disabled = false
style = "bold bright-blue"

[os.symbols]
Arch = "  "
EndeavourOS = "  "

[git_branch]
format = "[$symbol$branch]($style) "
style = "italic bright-purple"

[git_status]
format = '[$all_status]($style)'
style = "bright-red"
ahead = "⇡${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
behind = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked = "? "
modified = " "
stashed = "[ ${count}](bright-blue)"
staged = "[󰐘 ${count}](bright-green)"
renamed = ""
deleted = " "


[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
