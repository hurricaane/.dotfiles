# ─── Catppuccin Mocha Palette ─────────────────────────────────────────────────
%hidden rosewater="#f5e0dc"
%hidden flamingo="#f2cdcd"
%hidden pink="#f5c2e7"
%hidden mauve="#cba6f7"
%hidden red="#f38ba8"
%hidden maroon="#eba0ac"
%hidden peach="#fab387"
%hidden yellow="#f9e2af"
%hidden green="#a6e3a1"
%hidden teal="#94e2d5"
%hidden sky="#89dceb"
%hidden sapphire="#74c7ec"
%hidden blue="#89b4fa"
%hidden lavender="#b4befe"
%hidden text="#cdd6f4"
%hidden subtext1="#bac2de"
%hidden subtext0="#a6adc8"
%hidden overlay2="#9399b2"
%hidden overlay1="#7f849c"
%hidden overlay0="#6c7086"
%hidden surface2="#585b70"
%hidden surface1="#45475a"
%hidden surface0="#313244"
%hidden base="#1e1e2e"
%hidden mantle="#181825"
%hidden crust="#11111b"

# ─── Status Bar Layout ────────────────────────────────────────────────────────
set-option -g status-left-length 200
set-option -g status-right-length 200
set-option -g status-interval 3

# Default style — transparent background so terminal bg shows through
set-option -g status-style "fg=${text},bg=default"
set-option -g status-justify centre

# Left: session name, green normally, mauve when prefix is active
set-option -g status-left "#{?client_prefix,#[fg=${maroon}]#[bold]#[bg=default]   #S ,#[fg=${green}]#[bold]#[bg=default]   #S }"

# Right: time
set-option -g status-right "#[fg=${lavender}] 󱑂 %H:%M "

# ─── Window Tabs ──────────────────────────────────────────────────────────────
set-option -g window-status-format "#[fg=${overlay1},bg=default] #I: #W "
set-option -g window-status-current-format "#[fg=${blue},bold,bg=default]#{?window_zoomed_flag,,󱂬} #[underscore]#I: #W"
set-option -g window-status-last-style "fg=${subtext0},bg=default"
set-option -g window-status-separator "  "

# ─── Messages ─────────────────────────────────────────────────────────────────
set-option -g message-style "fg=${yellow},bold,bg=${surface0}"
set-option -g message-command-style "fg=${yellow},bold,bg=${surface0}"

# ─── Pane Borders ─────────────────────────────────────────────────────────────
set-option -g pane-active-border-style "fg=${mauve},bg=default"
set-option -g pane-border-style "fg=${surface2},bg=default"
